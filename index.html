<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanyon Math Tutoring</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a23 0%, #1a1a3e 50%, #0f0f2a 100%);
            color: #e0e0ff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a23 0%, #1a1a3e 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(88, 166, 255, 0.2);
            border-top: 4px solid #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Sidebar */
        .sidebar {
            width: 80px;
            background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
            border-right: 2px solid #30363d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
            transition: width 0.3s ease;
            z-index: 1000;
        }

        .sidebar:hover {
            width: 90px;
        }

        .nav-button {
            width: 60px;
            height: 60px;
            margin: 15px 0;
            background: linear-gradient(145deg, #21262d, #161b22);
            border: 2px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .nav-button:hover::before {
            left: 100%;
        }

        .nav-button:hover {
            border-color: #58a6ff;
            background: linear-gradient(145deg, #238636, #1a7f37);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(88, 166, 255, 0.3);
        }

        .nav-button.active {
            border-color: #f85149;
            background: linear-gradient(145deg, #da3633, #bc2c2c);
            box-shadow: 0 0 20px rgba(248, 81, 73, 0.5);
        }

        /* Icons */
        .home-icon {
            width: 28px;
            height: 28px;
            background: 
                conic-gradient(from 225deg at 50% 0%, #ffffff 90deg, #58a6ff 90deg 180deg, #ffffff 180deg 270deg, #58a6ff 270deg);
            clip-path: polygon(50% 0%, 0% 70%, 25% 100%, 50% 85%, 75% 100%, 100% 70%);
            position: relative;
        }

        .home-icon::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 15px;
            background: #ffffff;
            clip-path: polygon(0% 0%, 50% 100%, 100% 0%);
            border-radius: 2px;
        }

        .controller-icon {
            width: 32px;
            height: 24px;
            position: relative;
            background: #ffffff;
            border-radius: 8px;
        }

        .controller-icon::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 4px;
            right: 4px;
            height: 8px;
            background: #58a6ff;
            border-radius: 4px;
        }

        .controller-icon::after {
            content: '';
            position: absolute;
            left: 8px;
            top: 14px;
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 14px 0 0 #ffffff;
        }

        .padlock-icon {
            width: 24px;
            height: 28px;
            position: relative;
            background: #ffffff;
            border-radius: 4px 4px 12px 12px;
        }

        .padlock-icon::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 14px;
            background: #58a6ff;
            border-radius: 6px;
        }

        .padlock-icon::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
            background: #ffffff;
            border-radius: 0 0 4px 4px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 2.5em;
            background: linear-gradient(45deg, #58a6ff, #79c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(88, 166, 255, 0.5);
        }

        .welcome-text {
            font-size: 1.2em;
            line-height: 1.6;
            color: #b0b0d0;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .game-card {
            background: linear-gradient(145deg, #21262d, #161b22);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 2px solid #30363d;
            position: relative;
            overflow: hidden;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #58a6ff, #79c0ff, #f85149, #58a6ff);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .game-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px rgba(88, 166, 255, 0.4);
            border-color: #58a6ff;
        }

        .game-card:hover::before {
            transform: scaleX(1);
        }

        .game-card h3 {
            color: #58a6ff;
            margin-bottom: 12px;
            font-size: 1.4em;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        .game-card p {
            color: #b0b0d0;
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .launch-indicator {
            font-size: 0.85em;
            color: #58a6ff;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .games-count {
            color: #79c0ff;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .cloaking-form {
            max-width: 500px;
            margin-top: 30px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: end;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0ff;
            font-weight: 500;
            font-size: 0.9em;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: #21262d;
            border: 2px solid #30363d;
            border-radius: 10px;
            color: #e0e0ff;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
        }

        .btn {
            background: linear-gradient(45deg, #58a6ff, #79c0ff);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            height: fit-content;
            flex-shrink: 0;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88, 166, 255, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #238636, #2ea043);
        }

        .btn-secondary:hover {
            box-shadow: 0 10px 25px rgba(35, 134, 54, 0.4);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div style="font-size: 1.2em; color: #58a6ff; margin-bottom: 10px;">Initializing...</div>
        <div style="color: #b0b0d0; font-size: 0.9em;">Loading game engine</div>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="nav-button active" data-section="home">
                <div class="home-icon"></div>
            </div>
            <div class="nav-button" data-section="games">
                <div class="controller-icon"></div>
            </div>
            <div class="nav-button" data-section="cloaking">
                <div class="padlock-icon"></div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Home Section -->
            <section id="home" class="content-section active">
                <h1 class="section-title">🎮 Games</h1>
                <p class="welcome-text">
                    Browse 100+ free games. Click any game to play
                </p>
            </section>

            <!-- Games Section -->
            <section id="games" class="content-section">
                <h1 class="section-title">🎮 Games (<span id="gamesCount">0</span>)</h1>
                <p class="welcome-text">Click any game to play fullscreen:</p>
                <div class="games-grid" id="gamesGrid"></div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </section>

            <!-- Cloaking Section -->
            <section id="cloaking" class="content-section">
                <h1 class="section-title">🕵️ Cloaking</h1>
                <p class="welcome-text">Stealth settings:</p>
                <div class="cloaking-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tabName">Tab Name:</label>
                            <input type="text" id="tabName" placeholder="Enter custom tab name">
                        </div>
                        <button type="button" class="btn" id="setTabName">Set</button>
                    </div>
                    <button type="button" class="btn btn-secondary" id="openBlank">Open about:blank</button>
                </div>
            </section>
        </main>
    </div>

    <!-- EXTERNAL GAME ENGINE -->
    <script src="games-engine.js"></script>
    <script>
        // Cloaking settings functionality
        document.getElementById('setTabName').addEventListener('click', function() {
            const tabNameInput = document.getElementById('tabName');
            const newTitle = tabNameInput.value.trim();
            document.title = newTitle || 'Lanyon Math Tutoring';
        });

        document.getElementById('openBlank').addEventListener('click', function() {
            const iframeContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        * { margin: 0; padding: 0; }
                        html, body { height: 100vh; overflow: hidden; }
                        iframe { 
                            width: 100%; 
                            height: 100%; 
                            border: none; 
                            position: fixed; 
                            top: 0; 
                            left: 0; 
                            z-index: 99999; 
                        }
                    </style>
                </head>
                <body>
                    <iframe src="index.html"></iframe>
                </body>
                </html>
            `;
            const newTab = window.open('about:blank', '_blank');
            newTab.document.write(iframeContent);
            newTab.document.close();
        });
    </script>
</body>
</html>
